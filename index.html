<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deadline Reports</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

<style>
:root{
  --text:#f8fafc;
  --soft:#dbeafe;
  --muted:#94a3b8;
  --blue:#4f8cff;
  --blue2:#2563eb;
  --cyan:#38d5ff;
  --line:rgba(148,163,184,.20);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,ui-sans-serif,system-ui,"Segoe UI",Arial,sans-serif;
  color:var(--text);
  background:#020617;
  overflow-x:hidden;
}
#vanta-bg{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(circle at 18% 20%,rgba(79,140,255,.45),transparent 28%),
    radial-gradient(circle at 82% 24%,rgba(56,213,255,.30),transparent 30%),
    radial-gradient(circle at 50% 86%,rgba(139,92,246,.20),transparent 34%),
    linear-gradient(145deg,#020617 0%,#07111f 46%,#0b1220 100%);
}
#vanta-bg canvas{opacity:.95!important}
.mesh{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    linear-gradient(rgba(148,163,184,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(148,163,184,.045) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at center,black 0%,transparent 78%);
}
.noise{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  opacity:.18;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
}
.shade{
  position:fixed;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(circle at center,rgba(2,6,23,.02),rgba(2,6,23,.62) 78%),
    linear-gradient(180deg,rgba(2,6,23,.08),rgba(2,6,23,.38));
}
.fallback{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:#60a5fa;
  box-shadow:0 0 22px #38bdf8;
  opacity:.75;
  animation:particleFly 13s linear infinite;
}
@keyframes particleFly{
  from{transform:translate3d(-12vw,8vh,0) scale(.75)}
  to{transform:translate3d(120vw,-20vh,0) scale(1.2)}
}
.wrap{
  position:relative;
  z-index:4;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:34px 22px;
}
.shell{
  width:100%;
  max-width:1080px;
  text-align:center;
}
.brandRow{
  display:inline-flex;
  align-items:center;
  gap:13px;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.38);
  backdrop-filter:blur(14px);
  padding:9px 15px 9px 11px;
  border-radius:999px;
  box-shadow:0 18px 50px rgba(0,0,0,.22);
  animation:fadeDown .7s both;
}
.mark{
  width:52px;
  height:52px;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(37,99,235,.32),rgba(56,189,248,.16));
  border:1px solid rgba(147,197,253,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(37,99,235,.20), inset 0 1px 0 rgba(255,255,255,.10);
  overflow:hidden;
}
.mark img{
  max-width:42px;
  max-height:42px;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.35));
}
.brandText{
  font-size:13px;
  font-weight:850;
  color:#dbeafe;
  letter-spacing:.01em;
}

/* Changed title format: clean readable two-line title */
.titleBlock{
  margin:22px auto 10px;
  animation:fadeUp .78s .08s both;
}
.titleSmall{
  display:block;
  color:#93c5fd;
  font-size:clamp(15px,2vw,22px);
  line-height:1.15;
  font-weight:900;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:8px;
}
.titleMain{
  display:block;
  color:#ffffff;
  font-size:clamp(42px,7vw,86px);
  line-height:1.02;
  letter-spacing:-.035em;
  font-weight:950;
  text-shadow:0 24px 70px rgba(0,0,0,.44);
}
.titleAccent{
  background:linear-gradient(90deg,#dbeafe,#7dd3fc,#ffffff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.subtitle{
  color:rgba(226,232,240,.80);
  font-size:clamp(14px,1.7vw,17px);
  margin:0 auto 24px;
  max-width:620px;
  line-height:1.55;
  animation:fadeUp .78s .16s both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

.panel{
  position:relative;
  overflow:hidden;
  border:1px solid rgba(148,163,184,.20);
  background:
    linear-gradient(180deg,rgba(15,23,42,.72),rgba(7,13,25,.58)),
    radial-gradient(circle at 10% 0%,rgba(59,130,246,.18),transparent 40%);
  border-radius:34px;
  padding:18px;
  box-shadow:
    0 36px 110px rgba(0,0,0,.46),
    inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(18px);
  animation:fadeUp .78s .24s both;
}
.panel:before{
  content:"";
  position:absolute;
  inset:-1px;
  pointer-events:none;
  background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.10) 36%,transparent 60%);
  transform:translateX(-100%);
  animation:sheen 7s ease-in-out infinite;
}
@keyframes sheen{
  0%,45%{transform:translateX(-100%)}
  60%,100%{transform:translateX(100%)}
}
.controls{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1.4fr 230px 128px;
  gap:12px;
}
.field{position:relative}
.icon{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  color:#93c5fd;
  font-size:20px;
  pointer-events:none;
}
input{
  width:100%;
  height:58px;
  background:rgba(2,6,23,.76);
  border:1px solid rgba(148,163,184,.22);
  outline:none;
  color:#f8fafc;
  border-radius:20px;
  padding:0 18px 0 54px;
  font-size:16px;
  font-weight:800;
  letter-spacing:.01em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  color-scheme:dark;
}
input[type="date"]{padding-left:18px;color:#dbeafe}
input:focus{
  border-color:rgba(56,189,248,.54);
  box-shadow:0 0 0 5px rgba(56,189,248,.13), inset 0 1px 0 rgba(255,255,255,.05);
}
button{
  height:58px;
  border:0;
  border-radius:20px;
  cursor:pointer;
  color:#fff;
  font-size:15px;
  font-weight:950;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  box-shadow:0 18px 40px rgba(37,99,235,.34);
  transition:transform .18s ease,filter .18s ease,box-shadow .18s ease;
}
button:hover{
  transform:translateY(-2px);
  filter:brightness(1.08);
  box-shadow:0 22px 48px rgba(37,99,235,.42);
}
.quick{
  position:relative;
  z-index:1;
  display:flex;
  gap:9px;
  flex-wrap:wrap;
  justify-content:flex-start;
  margin:13px 2px 0;
}
.quick span{
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.58);
  color:#cbd5e1;
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  user-select:none;
  transition:.18s ease;
}
.quick span:hover{
  color:#fff;
  border-color:rgba(56,189,248,.42);
  background:rgba(37,99,235,.16);
}
.status{
  position:relative;
  z-index:1;
  text-align:left;
  color:rgba(203,213,225,.84);
  font-size:13px;
  min-height:18px;
  margin:16px 4px 0;
}
.results{
  position:relative;
  z-index:1;
  display:grid;
  gap:11px;
  max-height:380px;
  overflow:auto;
  padding:4px 4px 2px;
  margin-top:14px;
}
.results::-webkit-scrollbar{width:8px}
.results::-webkit-scrollbar-track{background:rgba(15,23,42,.42);border-radius:999px}
.results::-webkit-scrollbar-thumb{background:rgba(96,165,250,.45);border-radius:999px}
.result{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  text-decoration:none;
  text-align:left;
  color:#fff;
  padding:16px 16px;
  border:1px solid rgba(148,163,184,.14);
  background:linear-gradient(180deg,rgba(15,23,42,.58),rgba(15,23,42,.44));
  border-radius:20px;
  transition:.2s ease;
}
.result:hover{
  transform:translateY(-2px) scale(1.006);
  border-color:rgba(56,189,248,.48);
  background:linear-gradient(180deg,rgba(30,41,59,.78),rgba(15,23,42,.62));
  box-shadow:0 18px 48px rgba(0,0,0,.26);
}
.reportTitle{font-size:15px;font-weight:950;letter-spacing:.01em}
.reportPath{color:#94a3b8;font-size:12px;margin-top:5px;word-break:break-all}
.pill{
  flex:0 0 auto;
  color:#dbeafe;
  background:rgba(37,99,235,.16);
  border:1px solid rgba(96,165,250,.38);
  border-radius:999px;
  padding:9px 12px;
  font-size:12px;
  font-weight:950;
}
.empty{
  border:1px dashed rgba(148,163,184,.22);
  color:rgba(203,213,225,.72);
  border-radius:20px;
  padding:20px;
  font-size:14px;
}
.loader{
  display:inline-block;
  width:12px;height:12px;border-radius:50%;
  border:2px solid rgba(147,197,253,.28);
  border-top-color:#93c5fd;
  animation:spin .85s linear infinite;
  vertical-align:-2px;
  margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){
  .wrap{padding:18px;align-items:flex-start}
  .brandRow{margin-top:4px}
  .mark{width:46px;height:46px;border-radius:15px}
  .mark img{max-width:37px;max-height:37px}
  .titleBlock{margin-top:18px}
  .titleSmall{font-size:14px;letter-spacing:.13em;margin-bottom:6px}
  .titleMain{font-size:clamp(40px,14vw,58px);line-height:1.04;letter-spacing:-.025em}
  .subtitle{margin-bottom:20px}
  .panel{border-radius:26px;padding:14px}
  .controls{grid-template-columns:1fr}
  input,button{height:56px}
  button{width:100%}
  .result{display:block}
  .pill{display:inline-block;margin-top:11px}
  .results{max-height:430px}
}
</style>
</head>

(function fallbackParticles(){
  const box = document.getElementById("fallback");

    s.style.height=s.style.width;
    s.style.borderRadius="50%";
    s.style.left=(-20-Math.random()*100)+"vw";
    s.style.top=(8+Math.random()*84)+"vh";

    s.style.animationDelay=(-Math.random()*16)+"s";
    box.appendChild(s);
  }
})();
function startVanta(){
  if(!window.VANTA || !window.THREE){

    wingSpan:24,
    speedLimit:4.5,
    separation:46,
    alignment:44,
    cohesion:38,
    quantity:4
  });
}
window.addEventListener("load", startVanta);
</script>

<script>
const OWNER="automation56-hub";
const REPO="deadline-reports";
const BASE_URL="https://automation56-hub.github.io/deadline-reports/";
const API_URL=`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/main?recursive=1`;

const input=document.getElementById("searchInput");
const dateInput=document.getElementById("dateInput");
const resultsEl=document.getElementById("results");
const statusEl=document.getElementById("status");
const searchBtn=document.getElementById("searchBtn");
const allBtn=document.getElementById("allBtn");
const todayBtn=document.getElementById("todayBtn");
const latestBtn=document.getElementById("latestBtn");

let reports=[];

function cleanName(path){
  return path.split("/").pop().replace(/\.html$/i,"").replace(/_/g,"/");
}
function reportDate(path){
  const m=path.match(/(\d{4})\/(\d{4}-\d{2}-\d{2})\//);
  return m?m[2]:"";
}
function todayISO(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function scoreReport(r,q){
  const hay=(r.name+" "+r.path+" "+r.date).toLowerCase();
  if(!q)return 1;
  if(hay.includes(q))return 100;
  const compact=hay.replace(/[^a-z0-9]/g,"");
  const cq=q.replace(/[^a-z0-9]/g,"");
  return compact.includes(cq)?80:0;
}
function render(list){
  resultsEl.innerHTML="";
  if(!list.length){
    resultsEl.innerHTML='<div class="empty">No reports found.</div>';
    return;
  }
  list.slice(0,50).forEach(r=>{
    const a=document.createElement("a");
    a.className="result";
    a.href=r.url;
    a.target="_blank";
    a.rel="noopener noreferrer";
    a.innerHTML=`
      <div>
        <div class="reportTitle">${r.name}</div>
        <div class="reportPath">${r.date ? r.date+" · " : ""}${r.path}</div>
      </div>
      <span class="pill">Open</span>
    `;
    resultsEl.appendChild(a);
  });
}
function doSearch(){
  const q=input.value.trim().toLowerCase();
  const selectedDate=dateInput.value.trim();
  const ranked=reports
    .filter(r=>!selectedDate || r.date===selectedDate)
    .map(r=>({r,s:scoreReport(r,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s || b.r.path.localeCompare(a.r.path))
    .map(x=>x.r);
  const parts=[`${ranked.length} report${ranked.length===1?"":"s"} found`];
  if(selectedDate)parts.push(selectedDate);
  if(q)parts.push(`"${input.value.trim()}"`);
  statusEl.textContent=parts.join(" · ");
  render(ranked);
}
async function loadReports(){
  try{
    const res=await fetch(API_URL,{cache:"no-store"});
    if(!res.ok)throw new Error("GitHub API error "+res.status);
    const data=await res.json();
    reports=(data.tree||[])
      .filter(x=>{
        const p=x.path.toLowerCase();
        return (
          x.type==="blob" &&
          /\.html$/i.test(x.path) &&
          p!=="index.html" &&
          !p.includes("test") &&
          p.includes("/")
        );
      })
      .map(x=>({path:x.path,name:cleanName(x.path),date:reportDate(x.path),url:BASE_URL+x.path}))
      .sort((a,b)=>b.path.localeCompare(a.path));
    doSearch();
  }catch(err){
    statusEl.textContent="Unable to load reports. Try refreshing.";
    resultsEl.innerHTML=`<div class="empty">${err.message}</div>`;
  }
}
input.addEventListener("input",doSearch);
dateInput.addEventListener("change",doSearch);
searchBtn.addEventListener("click",doSearch);
allBtn.addEventListener("click",()=>{dateInput.value="";doSearch();});
todayBtn.addEventListener("click",()=>{dateInput.value=todayISO();doSearch();});
latestBtn.addEventListener("click",()=>{if(reports.length)window.open(reports[0].url,"_blank","noopener,noreferrer");});
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const first=resultsEl.querySelector("a.result");
    if(first)window.open(first.href,"_blank","noopener,noreferrer");
  }
});
loadReports();
</script>
</body>
